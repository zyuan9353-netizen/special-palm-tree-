<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>AI歌词配置预览工作台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;600" rel="stylesheet"/>
    <style>
        /* 基础样式回归自然滚动 */
        body { background-color: #1a1611; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 0; }
        
        /* 预览模式下的歌词染色 */
        .ktv-lyric-box {
            font-size: 2rem;
            font-weight: 900;
            color: rgba(255,255,255,0.2);
            position: relative;
            display: inline-block;
            line-height: 1.4;
        }
        @media (max-width: 768px) { .ktv-lyric-box { font-size: 1.5rem; } }

        .ktv-lyric-fill {
            position: absolute;
            top: 0; left: 0;
            color: #f99406;
            overflow: hidden;
            white-space: nowrap;
            width: var(--fill-width, 0%);
            transition: width 0.1s linear;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 模拟 QQ 音乐进度条 */
        .qq-slider { height: 40px; display: flex; align-items: center; cursor: pointer; position: relative; width: 100%; }
        .qq-slider-track { height: 3px; background: rgba(255,255,255,0.1); width: 100%; border-radius: 2px; position: relative; }
        .qq-slider-fill { height: 100%; background: #f99406; width: 0%; border-radius: 2px; position: absolute; }
        .qq-slider-thumb { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(249,148,6,0.5); }

        .glass { background: rgba(35, 30, 24, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }

        /* 强制预览模式全屏锁定 */
        .preview-active { position: fixed; inset: 0; overflow: hidden; z-index: 100; background: #000; }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

<!-- 顶部导航 -->
<header class="h-14 border-b border-white/5 flex items-center justify-between px-6 bg-[#1a1611] sticky top-0 z-[110]">
    <div class="flex items-center gap-3">
        <button id="btnBack" onclick="exitPreview()" class="hidden material-symbols-outlined text-[#f99406]">arrow_back</button>
        <span class="material-symbols-outlined text-[#f99406] text-2xl font-bold">album</span>
        <h1 class="text-[10px] font-black tracking-widest uppercase">AI Lyric <span class="text-[#f99406]">Station</span></h1>
    </div>
</header>

<!-- 【页面一：配置中心】 -->
<!-- 取消了固定高度，允许手机正常往下滑动 -->
<div id="pageConfig" class="p-4 lg:p-10 flex flex-col lg:flex-row gap-6 lg:gap-10">
    
    <!-- AI识别模块 (橙色) -->
    <section class="flex-1 glass rounded-[2.5rem] p-6 md:p-8 flex flex-col gap-6 border-t-2 border-[#f99406]">
        <h2 class="text-lg font-bold flex items-center gap-2"><span class="material-symbols-outlined text-[#f99406]">psychology</span>识别歌词文件预览</h2>
        
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">视频ID</label>
                <input type="text" id="ai_vid" placeholder="输入视频ID锁定库资源" class="w-full bg-white/5 border-white/10 rounded-2xl py-3 px-4 text-sm focus:ring-[#f99406]">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="ai_song" placeholder="歌曲名称" class="bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
                <input type="text" placeholder="歌手名称" class="bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
            </div>
            
            <input type="text" placeholder="专辑名称 (综艺名称)" class="w-full bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
            
            <select class="w-full bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
                <option>中文 / 英文 / 粤语 / 混和</option>
                <option>纯中文</option>
                <option>纯英文</option>
            </select>

            <div class="flex gap-6 p-1">
                <label class="flex items-center gap-2 text-xs"><input type="radio" name="r1" checked class="text-[#f99406]"> 识别声音</label>
                <label class="flex items-center gap-2 text-xs"><input type="radio" name="r1" class="text-[#f99406]"> 不识别</label>
            </div>

            <button onclick="enterPreview('AI')" class="w-full bg-[#f99406] text-black font-black py-4 rounded-2xl shadow-xl shadow-orange-900/20 active:scale-95 transition-all">生成歌词并进入预览</button>
        </div>
    </section>

    <!-- 本地歌词绑定模块 (蓝色按钮) -->
    <section class="flex-1 glass rounded-[2.5rem] p-6 md:p-8 flex flex-col gap-6 border-t-2 border-blue-600">
        <h2 class="text-lg font-bold flex items-center gap-2 text-blue-400"><span class="material-symbols-outlined">attachment</span>本地歌词绑定</h2>
        
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">视频ID</label>
                <input type="text" id="local_vid" placeholder="输入视频ID锁定库资源" class="w-full bg-white/5 border-white/10 rounded-2xl py-3 px-4 text-sm focus:ring-blue-600">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="local_song" placeholder="歌曲名称" class="bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
                <input type="text" placeholder="歌手名称" class="bg-white/5 border-white/10 rounded-xl py-3 px-4 text-sm">
            </div>

            <!-- 文件上传 -->
            <div class="border-2 border-dashed border-white/10 rounded-2xl p-6 text-center cursor-pointer hover:border-blue-500/50" onclick="document.getElementById('f_up').click()">
                <span class="material-symbols-outlined text-2xl text-slate-500 mb-1">cloud_upload</span>
                <p id="f_hint" class="text-[10px] text-slate-400 uppercase tracking-widest">点击上传本地歌词文件</p>
                <input type="file" id="f_up" class="hidden" onchange="onFile(this)">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] text-slate-500 font-bold uppercase ml-1">人声开始毫秒 (ms)</label>
                <input type="number" id="local_ms" placeholder="输入毫秒" class="w-full bg-white/5 border-white/10 rounded-xl py-4 text-center font-mono text-blue-400 text-xl">
            </div>

            <!-- 蓝色按钮 -->
            <button onclick="enterPreview('LOCAL')" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-900/40 active:scale-95 transition-all">进入预览</button>
        </div>
    </section>

    <!-- 增加底部留白，防止手机端最后按钮被遮挡 -->
    <div class="h-10 lg:hidden"></div>
</div>

<!-- 【页面二：预览工作台】 -->
<div id="pagePreview" class="hidden">
    <!-- 内部容器负责全屏 -->
    <div class="fixed inset-0 flex flex-col bg-black">
        
        <!-- 四排精修控制面板 -->
        <div class="absolute top-16 right-4 left-4 md:left-auto md:w-80 z-50 flex flex-col gap-2 p-3 glass rounded-2xl">
            <!-- R1 -->
            <div class="flex gap-2">
                <button onclick="document.getElementById('f_edit').click()" class="flex-1 bg-white/5 py-2 rounded-lg text-[10px] border border-white/5">上传本地歌词</button>
                <input type="file" id="f_edit" class="hidden" onchange="onFile(this)">
                <button onclick="toggleModal(true)" class="flex-1 bg-white/5 py-2 rounded-lg text-[10px] border border-white/5">本地歌词预览功能</button>
            </div>
            <!-- R2 -->
            <div class="text-[9px] text-slate-500 bg-black/40 px-3 py-1.5 rounded flex items-center gap-2">
                文件: <span id="f_name_view" class="text-blue-400 truncate uppercase font-bold tracking-tighter">未上传文件</span>
            </div>
            <!-- R3 -->
            <div class="flex gap-2 items-center bg-black/60 p-1 rounded-xl">
                <div class="flex-1 px-2 flex items-center">
                    <span class="text-[9px] text-slate-500 mr-2 uppercase">偏移值</span>
                    <input type="number" id="offset_in" value="0" class="w-full bg-transparent border-none text-xs text-[#f99406] p-0 focus:ring-0 font-mono">
                </div>
                <button onclick="applyOffset()" class="bg-[#f99406] text-black text-[10px] px-3 py-1.5 rounded-lg font-bold">设置应用偏移</button>
            </div>
            <!-- R4 -->
            <div class="flex justify-between items-center px-3 py-1.5 bg-[#f99406]/5 rounded-lg border border-[#f99406]/10">
                <span class="text-[9px] text-slate-500 uppercase">人声时间点:</span>
                <span id="vocal_time_display" class="text-xs font-mono text-[#f99406] font-bold">00:00.000</span>
            </div>
        </div>

        <!-- 主预览区 -->
        <div class="flex-1 flex flex-col pt-14">
            <!-- 视频画面 -->
            <div class="flex-[2] relative bg-[#0a0a0a] flex items-center justify-center overflow-hidden">
                <div id="v_visual" class="absolute inset-0 bg-cover bg-center opacity-40 transition-transform duration-[4s]" style="background-image: url('https://images.unsplash.com/photo-1598387181032-a3103a2db5b3?q=80&w=2000&auto=format&fit=crop');"></div>
                <button id="playBtn" onclick="togglePlay()" class="z-20 w-20 h-20 bg-[#f99406]/10 border-2 border-[#f99406] rounded-full flex items-center justify-center">
                    <span id="playIcon" class="material-symbols-outlined text-[#f99406] text-5xl">play_arrow</span>
                </button>
            </div>

            <!-- 字幕托盘 (视频下方) -->
            <div class="flex-1 bg-[#1a1611] flex flex-col items-center justify-center px-6 text-center shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-10">
                <p id="previewModeHint" class="text-[9px] tracking-[0.5em] text-white/20 uppercase font-black mb-3">Waiting Sync</p>
                <div class="ktv-lyric-box">
                    <span id="lyricBase">准备开始播放...</span>
                    <div id="lyricFill" class="ktv-lyric-fill">准备开始播放...</div>
                </div>
            </div>
        </div>

        <!-- 底部控制条 -->
        <div class="h-28 bg-[#1a1611] px-8 flex items-center gap-4 border-t border-white/5">
            <span id="curTime" class="text-[10px] font-mono text-slate-500 w-10">00:00</span>
            <div class="flex-1 qq-slider" id="sliderArea">
                <div class="qq-slider-track">
                    <div id="sliderFill" class="qq-slider-fill"></div>
                    <div id="sliderThumb" class="qq-slider-thumb" style="left: 0%"></div>
                </div>
            </div>
            <span class="text-[10px] font-mono text-slate-500 w-10">03:30</span>
        </div>
    </div>
</div>

<!-- 文件预览浮层 -->
<div id="lyricModal" class="hidden fixed inset-0 bg-black/98 z-[200] p-6 flex flex-col">
    <div class="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
        <h2 class="font-bold text-blue-400 text-xs tracking-widest uppercase tracking-widest">Lyric File Contents</h2>
        <button onclick="toggleModal(false)" class="material-symbols-outlined">close</button>
    </div>
    <div class="flex-1 overflow-y-auto text-slate-500 font-mono text-[11px] leading-relaxed p-4 bg-white/5 rounded-2xl">
        <pre id="raw_lyric_box">等待读取...</pre>
    </div>
    <button onclick="toggleModal(false)" class="mt-6 w-full py-4 bg-white/10 rounded-2xl font-bold">返回</button>
</div>

<script>
    let isPlaying = false;
    let currentTime = 0;
    let duration = 210;
    let baseMs = 0;
    let timer = null;

    // 视图管理
    function enterPreview(type) {
        const vid = document.getElementById(type === 'AI' ? 'ai_vid' : 'local_vid').value;
        if(!vid) return alert("必须输入视频ID以锁定库资源");

        baseMs = type === 'AI' ? 15000 : (parseInt(document.getElementById('local_ms').value) || 0);
        
        document.getElementById('previewModeHint').innerText = `${type} 模式 - 视频源已锁定`;
        document.body.classList.add('preview-active');
        document.getElementById('pageConfig').classList.add('hidden');
        document.getElementById('pagePreview').classList.remove('hidden');
        document.getElementById('btnBack').classList.remove('hidden');
        
        currentTime = 0;
        updateUI();
        updateVocalTime(0);
    }

    function exitPreview() {
        document.body.classList.remove('preview-active');
        document.getElementById('pageConfig').classList.remove('hidden');
        document.getElementById('pagePreview').classList.add('hidden');
        document.getElementById('btnBack').classList.add('hidden');
        stopPlay();
    }

    // 播放逻辑
    function togglePlay() {
        isPlaying = !isPlaying;
        document.getElementById('playIcon').innerText = isPlaying ? 'pause' : 'play_arrow';
        document.getElementById('v_visual').style.transform = isPlaying ? 'scale(1.1)' : 'scale(1)';
        
        if(isPlaying) {
            timer = setInterval(() => {
                if(currentTime < duration) {
                    currentTime += 0.1;
                    updateUI();
                } else { stopPlay(); }
            }, 100);
        } else { clearInterval(timer); }
    }

    function stopPlay() {
        isPlaying = false;
        clearInterval(timer);
        document.getElementById('playIcon').innerText = 'play_arrow';
        document.getElementById('v_visual').style.transform = 'scale(1)';
    }

    function updateUI() {
        const percent = (currentTime / duration) * 100;
        document.getElementById('sliderFill').style.width = percent + '%';
        document.getElementById('sliderThumb').style.left = percent + '%';
        
        const mm = String(Math.floor(currentTime / 60)).padStart(2, '0');
        const ss = String(Math.floor(currentTime % 60)).padStart(2, '0');
        document.getElementById('curTime').innerText = `${mm}:${ss}`;

        // 染色模拟
        const sentencePercent = ((currentTime % 5) / 5) * 100;
        document.getElementById('lyricFill').style.setProperty('--fill-width', sentencePercent + '%');
    }

    // 进度条交互 (支持手机触摸)
    const sliderArea = document.getElementById('sliderArea');
    function handleSeek(e) {
        const rect = sliderArea.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const pos = (clientX - rect.left) / rect.width;
        currentTime = Math.max(0, Math.min(duration, pos * duration));
        updateUI();
    }
    sliderArea.addEventListener('click', handleSeek);
    sliderArea.addEventListener('touchmove', (e) => { e.preventDefault(); handleSeek(e); });

    // 文件处理
    function onFile(input) {
        if(input.files && input.files[0]) {
            const f = input.files[0];
            document.getElementById('f_hint').innerText = "已加载: " + f.name;
            document.getElementById('f_name_view').innerText = f.name;
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('raw_lyric_box').innerText = e.target.result; };
            reader.readAsText(f);
        }
    }

    // 偏移应用
    function applyOffset() {
        const offset = parseInt(document.getElementById('offset_in').value) || 0;
        updateVocalTime(offset);
        alert("偏移已应用，预览自动刷新");
    }

    function updateVocalTime(offset) {
        const total = Math.max(0, baseMs + offset);
        const d = new Date(total);
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        document.getElementById('vocal_time_display').innerText = `${mm}:${ss}.${ms}`;
    }

    function toggleModal(show) {
        document.getElementById('lyricModal').classList.toggle('hidden', !show);
    }
</script>

</body>
</html>
